description = "Main entry point for SDD design."
prompt = """Read the orchestration rules in AGENT.md. Delegate to the Design Agent (agents/design-agent.md) using the Task tool.

Command: /sdd-design
User args: {{args}}

Before delegating:
1. Read .sdd/context/context.json to get current_feature and current_stage
2. If no active feature, ask the user for a feature name first, create the feature directory, then delegate
3. Read agents/design-agent.md and pass its full content as the subagent prompt along with current context"""
