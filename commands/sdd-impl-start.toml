description = "Load context and scaffold code for tasks. No args = all pending tasks; with task ID = single task."
prompt = """Read and follow the sdd-implementer skill (skills/sdd-implementer/SKILL.md).

Command: /sdd-impl-start
Task ID (optional): {{args}}

Before executing, read .sdd/context/context.json for current state. If no task ID is provided, execute all pending tasks in dependency order (batch mode). If a task ID is provided, execute only that task."""
